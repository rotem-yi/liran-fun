<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to Friday</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void: #0d0618;
    --cream: #f5e6c8;
    --red: #c8102e;
    --quantum: #00d4ff;
    --gold: #e8b84b;
    --violet: #6a0dad;
  }
  body {
    background-color: var(--void);
    color: var(--cream);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .bg-pastry {
    background-image:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(232,184,75,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 85% 70%, rgba(245,230,200,0.08) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(232,184,75,0.03) 40px, rgba(232,184,75,0.03) 41px);
  }
  .bg-strings {
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0,212,255,0.04) 60px, rgba(0,212,255,0.04) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(106,13,173,0.04) 80px, rgba(106,13,173,0.04) 81px),
      repeating-linear-gradient(33deg, transparent, transparent 120px, rgba(0,212,255,0.025) 120px, rgba(0,212,255,0.025) 121px);
  }
  .bg-cinema {
    background-image: linear-gradient(160deg, rgba(200,16,46,0.06) 0%, transparent 40%, rgba(200,16,46,0.04) 100%);
  }
  .bg-nepal {
    background-image: radial-gradient(ellipse 100% 50% at 50% 100%, rgba(106,13,173,0.15) 0%, transparent 60%);
  }
  .floaters { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .floater {
    position: absolute;
    font-size: 1.1rem;
    opacity: 0.1;
    animation: float linear infinite;
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
  }
  @keyframes float {
    0% { transform: translateY(110vh) rotate(-5deg); opacity: 0; }
    5% { opacity: 0.1; }
    95% { opacity: 0.1; }
    100% { transform: translateY(-10vh) rotate(5deg); opacity: 0; }
  }
  .stage {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem; gap: 2rem;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.3em;
    color: var(--quantum); text-transform: uppercase;
    text-align: center; opacity: 0.7; line-height: 2;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    font-weight: 900; text-align: center;
    line-height: 1.05; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--cream) 0%, var(--gold) 50%, var(--cream) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .countdown-wrap {
    display: flex; gap: clamp(0.5rem, 2vw, 1.5rem);
    align-items: flex-start; flex-wrap: wrap; justify-content: center;
  }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
  .price-tag {
    background: var(--cream); color: var(--void);
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 6rem); font-weight: 900;
    width: clamp(80px, 16vw, 130px); height: clamp(90px, 18vw, 145px);
    display: flex; align-items: center; justify-content: center;
    position: relative; border-radius: 4px;
    box-shadow: 0 0 0 2px var(--gold), 0 0 30px rgba(232,184,75,0.2), 6px 6px 0 rgba(0,0,0,0.4);
  }
  .price-tag::before {
    content: ''; position: absolute; top: -10px; left: 50%;
    transform: translateX(-50%); width: 18px; height: 18px;
    background: var(--void); border: 2px solid var(--gold); border-radius: 50%;
  }
  .price-tag::after {
    content: ''; position: absolute; top: -4px; left: 50%;
    transform: translateX(-50%); width: 2px; height: 14px; background: var(--gold);
  }
  .unit-label {
    font-family: 'Space Mono', monospace; font-size: 0.55rem;
    letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; text-align: center;
  }
  .sep {
    color: var(--gold); font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 900;
    line-height: 1; margin-top: clamp(15px, 3vw, 25px); opacity: 0.6;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.15; } }
  .arrived-msg {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 700;
    color: var(--gold); text-align: center;
    animation: glow 2s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(232,184,75,0.5); }
    50% { text-shadow: 0 0 60px rgba(232,184,75,0.9), 0 0 100px rgba(0,212,255,0.3); }
  }

  /* === ILLUSTRATIONS ROW === */
  .illustrations {
    display: flex; gap: clamp(0.8rem, 2.5vw, 2rem);
    align-items: center; justify-content: center;
    flex-wrap: wrap;
  }
  .illus-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    opacity: 0.85; transition: opacity 0.2s, transform 0.2s;
  }
  .illus-wrap:hover { opacity: 1; transform: translateY(-4px); }
  .illus-wrap svg { display: block; }

  /* Mask GIF */
  .mask-frame { display: inline-block; }
  .mask-frame img {
    width: clamp(140px, 20vw, 200px);
    border: 3px solid var(--gold); border-radius: 2px;
    box-shadow: 0 0 40px rgba(232,184,75,0.3), 0 0 80px rgba(200,16,46,0.15);
    display: block;
  }
  .mask-caption {
    text-align: center; font-family: 'Space Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.2em;
    color: var(--red); text-transform: uppercase; margin-top: 0.5rem; opacity: 0.7;
  }

  .quote {
    font-family: 'Space Mono', monospace; font-size: 0.55rem;
    line-height: 1.8; letter-spacing: 0.05em;
    color: rgba(245,230,200,0.3); text-align: center; max-width: 520px;
    border-top: 1px solid rgba(232,184,75,0.15); padding-top: 1.5rem;
  }
  @media (max-width: 480px) { .sep { display: none; } .countdown-wrap { gap: 0.4rem; } }
  @media (prefers-reduced-motion: reduce) { .floater, .sep { animation: none; } }
</style>
</head>
<body>
<div class="bg-layer bg-pastry"></div>
<div class="bg-layer bg-strings"></div>
<div class="bg-layer bg-cinema"></div>
<div class="bg-layer bg-nepal"></div>
<div class="floaters" id="floaters"></div>

<main class="stage">
  <div>
    <p class="eyebrow">26.06.2026 &bull; 10:00</p>
    <h1 class="title">Until Friday</h1>
  </div>

  <div id="countdown-container">
    <div class="countdown-wrap" id="countdown">
      <div class="unit"><div class="price-tag" id="d">00</div><div class="unit-label">Days</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="price-tag" id="h">00</div><div class="unit-label">Hours</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="price-tag" id="m">00</div><div class="unit-label">Minutes</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="price-tag" id="s">00</div><div class="unit-label">Seconds</div></div>
    </div>
  </div>

  <!-- ILLUSTRATIONS -->
  <div class="illustrations">

    <!-- 1. PATISSERIE: croissant + macarons -->
    <div class="illus-wrap">
      <svg width="110" height="100" viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Croissant body -->
        <g transform="translate(20,10)">
          <!-- main arc -->
          <path d="M5 60 Q10 20 35 10 Q60 0 70 20 Q80 40 65 60 Q50 75 35 72 Q15 68 5 60Z"
            fill="#e8b84b" stroke="#c49a2e" stroke-width="1.5"/>
          <!-- layering lines -->
          <path d="M20 55 Q30 35 50 28" stroke="#c49a2e" stroke-width="1" fill="none" opacity="0.6"/>
          <path d="M25 62 Q38 42 58 36" stroke="#c49a2e" stroke-width="1" fill="none" opacity="0.6"/>
          <!-- tips -->
          <path d="M5 60 Q0 70 8 74" stroke="#c49a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M65 60 Q72 68 68 75" stroke="#c49a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- shine -->
          <ellipse cx="30" cy="28" rx="8" ry="4" fill="rgba(255,255,255,0.25)" transform="rotate(-30 30 28)"/>
        </g>
        <!-- Macarons bottom row -->
        <g transform="translate(5,72)">
          <!-- macaron 1: pink -->
          <ellipse cx="18" cy="10" rx="13" ry="6" fill="#e8a0b0"/>
          <ellipse cx="18" cy="14" rx="13" ry="3" fill="#f5c8d2" opacity="0.6"/>
          <ellipse cx="18" cy="18" rx="13" ry="6" fill="#e8a0b0"/>
          <line x1="5" y1="12" x2="31" y2="12" stroke="#d4708a" stroke-width="0.8" opacity="0.5"/>
          <!-- macaron 2: pistachio -->
          <ellipse cx="55" cy="10" rx="13" ry="6" fill="#8db87a"/>
          <ellipse cx="55" cy="14" rx="13" ry="3" fill="#b8d4a0" opacity="0.6"/>
          <ellipse cx="55" cy="18" rx="13" ry="6" fill="#8db87a"/>
          <line x1="42" y1="12" x2="68" y2="12" stroke="#5a8a48" stroke-width="0.8" opacity="0.5"/>
          <!-- macaron 3: lavender -->
          <ellipse cx="92" cy="10" rx="13" ry="6" fill="#b8a0d8"/>
          <ellipse cx="92" cy="14" rx="13" ry="3" fill="#d8c8f0" opacity="0.6"/>
          <ellipse cx="92" cy="18" rx="13" ry="6" fill="#b8a0d8"/>
          <line x1="79" y1="12" x2="105" y2="12" stroke="#8870b8" stroke-width="0.8" opacity="0.5"/>
        </g>
      </svg>
    </div>

    <!-- 2. STRING THEORY: Calabi-Yau manifold-ish + strings -->
    <div class="illus-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="qg" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#6a0dad" stop-opacity="0.2"/>
          </radialGradient>
        </defs>
        <!-- outer ring -->
        <ellipse cx="50" cy="50" rx="44" ry="44" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
        <!-- vibrating strings — sinusoidal curves -->
        <path d="M10 30 Q20 20 30 30 Q40 40 50 30 Q60 20 70 30 Q80 40 90 30" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
        <path d="M10 45 Q25 35 40 45 Q55 55 70 45 Q82 38 90 45" fill="none" stroke="#b06aff" stroke-width="1.2" opacity="0.7"/>
        <path d="M10 60 Q20 50 30 60 Q40 70 50 60 Q60 50 70 60 Q80 70 90 60" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
        <path d="M10 75 Q25 65 40 75 Q55 85 70 75 Q82 68 90 75" fill="none" stroke="#b06aff" stroke-width="0.8" opacity="0.5"/>
        <!-- central torus shape -->
        <ellipse cx="50" cy="50" rx="20" ry="8" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
        <ellipse cx="50" cy="50" rx="8" ry="20" fill="none" stroke="#b06aff" stroke-width="1.5" opacity="0.8"/>
        <circle cx="50" cy="50" r="4" fill="url(#qg)"/>
        <!-- dimension labels -->
        <text x="50" y="97" text-anchor="middle" font-family="monospace" font-size="7" fill="#00d4ff" opacity="0.8">D = 10</text>
      </svg>
    </div>

<script>
  // Target: Friday 26 June 2026, 10:00 AM Israel time (UTC+3) = 07:00 UTC
  const target = new Date('2026-06-26T07:00:00Z');

  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

  function tick() {
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById('countdown').innerHTML =
        '<div class="arrived-msg">The moment has arrived.<br>SSSSMOKIN\'</div>';
      return;
    }
    const totalSecs = diff / 1000;
    document.getElementById('d').textContent = pad(totalSecs / 86400);
    document.getElementById('h').textContent = pad((totalSecs % 86400) / 3600);
    document.getElementById('m').textContent = pad((totalSecs % 3600) / 60);
    document.getElementById('s').textContent = pad(totalSecs % 60);
  }
  tick();
  setInterval(tick, 1000);

  // Floating ambient words
  const words = [
    'éclair','tarte tatin','choux','mille-feuille','ganache',
    'E = mc²','∮','superstring','brane','compactification','Calabi-Yau',
    '4 luni 3 săptămâni','Nae Caranfil','Cristi Puiu','noul val',
    'remittances','GDP $1,336','micro-credit','Kathmandu','Mt Everest',
    'cannelé','D=10','La Moft','rupee','praline','graviton',
  ];
  const floaters = document.getElementById('floaters');
  words.forEach((w, i) => {
    const el = document.createElement('span');
    el.className = 'floater';
    el.textContent = w;
    el.style.left = (5 + (i * 37) % 90) + '%';
    el.style.animationDuration = (18 + (i * 7) % 22) + 's';
    el.style.animationDelay = (-((i * 5) % 20)) + 's';
    el.style.fontSize = (0.6 + (i % 4) * 0.2) + 'rem';
    floaters.appendChild(el);
  });
</script>
